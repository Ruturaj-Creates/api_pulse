# Run PostgreSQL locally without installing it on your machine.
#
# Start:  docker compose up -d
# Stop:   docker compose down
# Logs:   docker compose logs -f db

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pulse_user
      POSTGRES_PASSWORD: pulse_password
      POSTGRES_DB: api_pulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse_user -d api_pulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional: run the FastAPI app in Docker (use after Step 2)
  # api:
  #   build: .
  #   ports:
  #     - "8000:8000"
  #   env_file:
  #     - .env
  #   depends_on:
  #     db:
  #       condition: service_healthy

volumes:
  postgres_data:
